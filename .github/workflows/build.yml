name: Build macOS App

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build and Package
    runs-on: macos-15

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Select Xcode
      run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
      # Using 16.2 as it's the latest stable generally available on macos-15 runners.

    - name: Build App (Unsigned)
      run: |
        xcodebuild -project restnow.xcodeproj \
          -scheme restnow \
          -configuration Release \
          -derivedDataPath build/DerivedData \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO

    - name: Package App
      run: |
        # Find the .app in DerivedData
        APP_PATH=$(find build/DerivedData -name "restnow.app" -type d | head -n 1)
        if [ -z "$APP_PATH" ]; then
          echo "Error: restnow.app not found in build directory."
          exit 1
        fi
        
        echo "Found app at: $APP_PATH"
        
        # Zip the .app directory
        cd $(dirname "$APP_PATH")
        zip -r restnow-app.zip "restnow.app"
        
        # Move it to workspace root for easy upload
        mv restnow-app.zip $GITHUB_WORKSPACE/

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: RestNow-macOS-App
        path: restnow-app.zip
        retention-days: 7
